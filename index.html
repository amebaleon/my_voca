<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#0a0a0a">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="VocaFlash">
<link rel="manifest" href="manifest.json">
<link rel="icon" href="icon-192.png">
<link rel="apple-touch-icon" href="icon-192.png">
<title>Voca Flash</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{--bg:#0a0a0a;--card:#161616;--card2:#1e1e1e;--blue:#3b82f6;--blue2:#2563eb;--text:#e8e8e8;--sub:#888;--green:#22c55e;--red:#ef4444;--gbg:#052e16;--rbg:#350a0a;--div:#222;--radius:14px}
html,body{height:100%;height:100dvh;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--text);overflow:hidden;touch-action:manipulation}
button{font-family:inherit;cursor:pointer;border:none;outline:none;-webkit-appearance:none}
input[type=file]{display:none}

/* ── Layout ── */
.screen{display:none;flex-direction:column;height:100vh;height:100dvh;padding:0 16px;padding-bottom:max(env(safe-area-inset-bottom),16px);overflow:hidden;position:absolute;inset:0}
.screen.active{display:flex}

/* ── HOME ── */
#home{padding-top:max(env(safe-area-inset-top),48px)}
.logo{text-align:center;margin-bottom:28px}
.logo h1{font-size:30px;font-weight:800;letter-spacing:.5px;background:linear-gradient(135deg,#60a5fa,#3b82f6);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.logo p{font-size:13px;color:var(--sub);margin-top:5px}
.upload-btn{width:100%;padding:15px;background:var(--blue);color:#fff;font-size:15px;font-weight:700;border-radius:var(--radius);display:flex;align-items:center;justify-content:center;gap:8px;transition:background .15s}
.upload-btn:active{background:var(--blue2)}
.upload-btn svg{width:20px;height:20px;fill:#fff}
.deck-list{flex:1;overflow-y:auto;margin-top:20px;padding-bottom:24px;-webkit-overflow-scrolling:touch}
.deck-card{background:var(--card);border-radius:var(--radius);padding:16px 18px;margin-bottom:10px;display:flex;align-items:center;gap:10px}
.deck-card:active{transform:scale(.97);transition:transform .1s}
.deck-body{flex:1;min-width:0}
.deck-name{font-size:16px;font-weight:700;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.deck-count{font-size:12px;color:var(--sub);margin-top:3px}
.deck-actions{display:flex;align-items:center;gap:8px;flex-shrink:0}
.deck-btn{width:34px;height:34px;border-radius:9px;background:#1a1a1a;color:#666;font-size:15px;display:flex;align-items:center;justify-content:center;border:1px solid #2a2a2a}
.deck-btn:active{background:#2a2a2a}
.deck-btn.del:active{color:var(--red)}
.deck-btn.edit:active{color:var(--blue)}
.deck-arrow{color:var(--blue);font-size:24px;font-weight:300}
.empty{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;color:#444;text-align:center;gap:12px}
.empty-icon{font-size:52px}
.empty p{font-size:14px;line-height:1.6}

/* ── TEST ── */
#test{padding-top:max(env(safe-area-inset-top),48px)}
.test-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.test-top-left{display:flex;align-items:center;gap:10px}
.quit-btn{width:34px;height:34px;border-radius:9px;background:var(--card);color:#888;font-size:20px;display:flex;align-items:center;justify-content:center}
.quit-btn:active{background:#2a2a2a}
.progress-txt{font-size:14px;font-weight:600;color:var(--sub)}
.skip-btn{padding:8px 16px;background:var(--card);border-radius:10px;font-size:13px;font-weight:600;color:var(--sub);transition:background .1s}
.skip-btn:active{background:#2a2a2a}
.progress-bar{height:3px;background:#1a1a1a;border-radius:2px;overflow:hidden;margin-bottom:4px}
.progress-fill{height:100%;background:var(--blue);border-radius:2px;transition:width .2s ease-out}
.word-area{flex:1;display:flex;align-items:center;justify-content:center;padding:0 8px}
.word-display{font-size:clamp(32px,10vw,52px);font-weight:800;color:#fff;text-align:center;word-break:break-word;line-height:1.2}
.choices{display:grid;grid-template-columns:1fr 1fr;gap:10px;padding-bottom:8px;flex-shrink:0}
.choice-btn{background:var(--card2);border-radius:var(--radius);padding:16px 10px;font-size:14px;font-weight:600;color:var(--text);text-align:center;min-height:64px;display:flex;align-items:center;justify-content:center;line-height:1.35;transition:transform .06s,background .12s;border:1.5px solid transparent;word-break:keep-all}
.choice-btn:active{transform:scale(.96)}
.choice-btn.correct{background:var(--gbg);border-color:var(--green);color:var(--green)}
.choice-btn.wrong{background:var(--rbg);border-color:var(--red);color:var(--red)}
.choice-btn.reveal{background:var(--gbg);border-color:var(--green);color:var(--green)}
.choice-btn.disabled{pointer-events:none}

/* ── EDIT ── */
#edit{padding-top:max(env(safe-area-inset-top),48px)}
.edit-header{display:flex;align-items:center;gap:12px;margin-bottom:16px}
.back-btn{width:36px;height:36px;border-radius:10px;background:var(--card);color:#aaa;font-size:20px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.back-btn:active{background:#2a2a2a}
.edit-title{font-size:20px;font-weight:800;color:#fff;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.edit-count{font-size:13px;color:var(--sub);flex-shrink:0}
.edit-list{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding-bottom:16px}
.edit-row{display:flex;align-items:center;gap:8px;padding:10px 0;border-bottom:1px solid var(--div)}
.edit-word{flex:1;min-width:0}
.edit-word input{width:100%;background:var(--card);border:1px solid #2a2a2a;border-radius:8px;padding:8px 10px;color:#fff;font-size:14px;font-weight:600;font-family:inherit}
.edit-word input:focus{border-color:var(--blue);outline:none}
.edit-meaning{flex:2;min-width:0}
.edit-meaning input{width:100%;background:var(--card);border:1px solid #2a2a2a;border-radius:8px;padding:8px 10px;color:#a0a0a0;font-size:13px;font-family:inherit}
.edit-meaning input:focus{border-color:var(--blue);outline:none}
.edit-del{width:30px;height:30px;border-radius:8px;background:transparent;color:#444;font-size:18px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.edit-del:active{color:var(--red)}
.edit-bottom{display:flex;gap:10px;flex-shrink:0;padding-top:12px}
.edit-bottom button{flex:1;padding:14px;border-radius:var(--radius);font-size:14px;font-weight:700}
.add-word-btn{background:var(--card2);color:var(--text);border:1px dashed #333}
.add-word-btn:active{background:#2a2a2a}
.save-btn{background:var(--blue);color:#fff}
.save-btn:active{background:var(--blue2)}

/* ── REVIEW ── */
#review{padding-top:max(env(safe-area-inset-top),48px)}
.review-header{text-align:center;margin-bottom:20px}
.review-header h2{font-size:24px;font-weight:800;color:#fff}
.review-header p{font-size:14px;color:var(--blue);font-weight:600;margin-top:4px}
.review-list{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding-bottom:16px}
.review-row{display:flex;padding:13px 4px;border-bottom:1px solid var(--div)}
.review-word{width:32%;font-size:15px;font-weight:700;color:#fff;padding-right:10px;flex-shrink:0}
.review-meaning{width:68%;font-size:13px;color:#a0a0a0;line-height:1.5}
.review-perfect{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;color:#555;text-align:center}
.review-perfect span{font-size:56px}
.review-perfect p{font-size:15px;line-height:1.6}
.home-btn{width:100%;padding:15px;background:var(--blue);color:#fff;font-size:15px;font-weight:700;border-radius:var(--radius);margin-bottom:8px;flex-shrink:0;transition:background .15s}
.home-btn:active{background:var(--blue2)}
.stats-bar{display:flex;justify-content:center;gap:20px;margin-bottom:16px}
.stat{text-align:center}
.stat .num{font-size:22px;font-weight:800;color:#fff}
.stat .label{font-size:11px;color:var(--sub);margin-top:2px}
.review-actions{display:flex;gap:8px;flex-shrink:0;margin-bottom:10px}
.review-actions button{flex:1;padding:12px 6px;border-radius:var(--radius);font-size:12px;font-weight:700;display:flex;align-items:center;justify-content:center;gap:5px;background:var(--card2);color:var(--text);border:1px solid #2a2a2a}
.review-actions button:active{background:#2a2a2a}
.review-actions .act-icon{font-size:15px}
</style>
</head>
<body>

<!-- ═══════════ HOME ═══════════ -->
<div id="home" class="screen active">
  <div class="logo">
    <h1>⚡ Voca Flash</h1>
    <p>무한 반복으로 영단어 각인</p>
  </div>
  <button class="upload-btn" onclick="document.getElementById('fileInput').click()">
    <svg viewBox="0 0 24 24"><path d="M12 2a1 1 0 011 1v10.586l3.293-3.293a1 1 0 111.414 1.414l-5 5a1 1 0 01-1.414 0l-5-5a1 1 0 111.414-1.414L11 13.586V3a1 1 0 011-1zM5 20a1 1 0 110 2h14a1 1 0 110-2H5z"/></svg>
    엑셀 파일 업로드 (.xlsx)
  </button>
  <input type="file" id="fileInput" accept=".xlsx,.xls" onchange="handleFile(event)">
  <div class="deck-list" id="deckList"></div>
</div>

<!-- ═══════════ TEST ═══════════ -->
<div id="test" class="screen">
  <div class="test-top">
    <div class="test-top-left">
      <button class="quit-btn" onclick="quitTest()">✕</button>
      <span class="progress-txt" id="progressTxt">1 / 100</span>
    </div>
    <button class="skip-btn" onclick="handleSkip()">넘기기</button>
  </div>
  <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
  <div class="word-area">
    <div class="word-display" id="wordDisplay"></div>
  </div>
  <div class="choices" id="choicesGrid"></div>
</div>

<!-- ═══════════ EDIT ═══════════ -->
<div id="edit" class="screen">
  <div class="edit-header">
    <button class="back-btn" onclick="saveAndBack()">←</button>
    <div class="edit-title" id="editTitle"></div>
    <div class="edit-count" id="editCount"></div>
  </div>
  <div class="edit-list" id="editList"></div>
  <div class="edit-bottom">
    <button class="add-word-btn" onclick="addWord()">+ 단어 추가</button>
    <button class="save-btn" onclick="saveAndBack()">저장</button>
  </div>
</div>

<!-- ═══════════ REVIEW ═══════════ -->
<div id="review" class="screen">
  <div class="review-header">
    <h2>학습 완료!</h2>
    <p id="reviewSub">오답 12개</p>
  </div>
  <div class="stats-bar" id="statsBar"></div>
  <div class="review-list" id="reviewListEl"></div>
  <div class="review-actions" id="reviewActions"></div>
  <button class="home-btn" onclick="showScreen('home')">홈으로 돌아가기</button>
</div>

<!-- ═══════════ SheetJS CDN ═══════════ -->
<script src="https://cdn.sheetjs.com/xlsx-0.20.3/package/dist/xlsx.full.min.js"></script>

<script>
/* ============================================
   STATE
   ============================================ */
const STORAGE_KEY = 'vocaflash_decks';
let decks = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');

// Test state
let testQueue = [];
let testIdx = 0;
let testChoices = [];
let reviewList = [];
let currentDeck = null;
let feedbackLocked = false;

// Edit state
let editDeckIdx = -1;
let editWords = [];

/* ============================================
   SCREEN NAV
   ============================================ */
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  if (id === 'home') renderDecks();
}

/* ============================================
   EXCEL PARSE
   ============================================ */
function handleFile(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(evt) {
    try {
      const data = new Uint8Array(evt.target.result);
      const wb = XLSX.read(data, { type: 'array' });
      const sheet = wb.Sheets[wb.SheetNames[0]];
      const rows = XLSX.utils.sheet_to_json(sheet, { header: 1, defval: '' });

      const words = [];
      for (let i = 0; i < rows.length; i++) {
        const w = String(rows[i][0] || '').trim();
        const m = String(rows[i][1] || '').trim();
        if (!w || !m) continue;
        if (i === 0 && w.toLowerCase() === 'word') continue;
        words.push({ word: w, meaning: m });
      }

      if (words.length === 0) {
        alert('유효한 단어를 찾을 수 없습니다.\n1열: Word, 2열: Meaning 형식을 확인하세요.');
        return;
      }

      const name = file.name.replace(/\.xlsx?$/i, '');
      const deck = { id: Date.now(), name, words, createdAt: Date.now() };
      decks.push(deck);
      saveDecks();
      renderDecks();
    } catch (err) {
      alert('파일 읽기 오류: ' + err.message);
    }
  };
  reader.readAsArrayBuffer(file);
  e.target.value = '';
}

/* ============================================
   STORAGE
   ============================================ */
function saveDecks() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(decks));
}

/* ============================================
   DECK LIST RENDER
   ============================================ */
function renderDecks() {
  const el = document.getElementById('deckList');
  if (decks.length === 0) {
    el.innerHTML = '<div class="empty"><span class="empty-icon">📚</span><p>단어장이 없습니다<br>엑셀 파일을 업로드해 주세요</p></div>';
    return;
  }
  el.innerHTML = decks.map((d, i) => `
    <div class="deck-card">
      <div class="deck-body" onclick="startTest(${i})">
        <div class="deck-name">${esc(d.name)}</div>
        <div class="deck-count">${d.words.length}개 단어</div>
      </div>
      <div class="deck-actions">
        <button class="deck-btn edit" onclick="openEdit(${i})">✎</button>
        <button class="deck-btn del" onclick="deleteDeck(${i})">✕</button>
      </div>
    </div>
  `).join('');
}

function deleteDeck(idx) {
  if (!confirm(`"${decks[idx].name}" 단어장을 삭제할까요?`)) return;
  decks.splice(idx, 1);
  saveDecks();
  renderDecks();
}

function esc(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

/* ============================================
   SHUFFLE UTIL
   ============================================ */
function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

/* ============================================
   START TEST
   ============================================ */
function startTest(deckIdx) {
  currentDeck = decks[deckIdx];
  if (!currentDeck || currentDeck.words.length < 4) {
    alert('최소 4개 이상의 단어가 필요합니다.');
    return;
  }

  const indices = shuffle(Array.from({ length: currentDeck.words.length }, (_, i) => i));
  testQueue = indices.slice(0, Math.min(500, indices.length));
  testIdx = 0;
  reviewList = [];
  feedbackLocked = false;

  showScreen('test');
  renderQuestion();
}

/* ============================================
   QUIT TEST
   ============================================ */
function quitTest() {
  if (testIdx > 0 && !confirm('테스트를 종료할까요?\n진행 상황이 사라집니다.')) return;
  showScreen('home');
}

/* ============================================
   RENDER QUESTION
   ============================================ */
function renderQuestion() {
  const total = testQueue.length;
  const progress = testIdx + 1;
  const wordObj = currentDeck.words[testQueue[testIdx]];

  document.getElementById('progressTxt').textContent = `${progress} / ${total}`;
  document.getElementById('progressFill').style.width = `${(progress / total) * 100}%`;
  document.getElementById('wordDisplay').textContent = wordObj.word;

  // Build choices: 1 correct + 3 wrong
  const correctMeaning = wordObj.meaning;
  const wrongPool = [];
  for (let i = 0; i < currentDeck.words.length; i++) {
    if (i !== testQueue[testIdx]) wrongPool.push(currentDeck.words[i].meaning);
  }
  const wrongs = shuffle(wrongPool).slice(0, 3);
  testChoices = shuffle([correctMeaning, ...wrongs]);

  const grid = document.getElementById('choicesGrid');
  grid.innerHTML = testChoices.map((c, i) => `
    <button class="choice-btn" onclick="handleChoice(${i})">${esc(c)}</button>
  `).join('');
}

/* ============================================
   HANDLE CHOICE
   ============================================ */
function handleChoice(idx) {
  if (feedbackLocked) return;

  const wordObj = currentDeck.words[testQueue[testIdx]];
  const selected = testChoices[idx];
  const isCorrect = selected === wordObj.meaning;

  if (isCorrect) {
    goNext();
  } else {
    feedbackLocked = true;
    reviewList.push(wordObj);

    const btns = document.querySelectorAll('.choice-btn');
    btns.forEach((btn, i) => {
      btn.classList.add('disabled');
      if (i === idx) btn.classList.add('wrong');
      if (testChoices[i] === wordObj.meaning) btn.classList.add('correct');
    });

    setTimeout(() => {
      feedbackLocked = false;
      goNext();
    }, 500);
  }
}

/* ============================================
   HANDLE SKIP
   ============================================ */
function handleSkip() {
  if (feedbackLocked) return;
  feedbackLocked = true;

  const wordObj = currentDeck.words[testQueue[testIdx]];
  reviewList.push(wordObj);

  const btns = document.querySelectorAll('.choice-btn');
  btns.forEach((btn, i) => {
    btn.classList.add('disabled');
    if (testChoices[i] === wordObj.meaning) btn.classList.add('reveal');
  });

  setTimeout(() => {
    feedbackLocked = false;
    goNext();
  }, 500);
}

/* ============================================
   GO NEXT / FINISH
   ============================================ */
function goNext() {
  testIdx++;
  if (testIdx >= testQueue.length) {
    showReview();
    return;
  }
  renderQuestion();
}

/* ============================================
   EDIT DECK
   ============================================ */
function openEdit(idx) {
  editDeckIdx = idx;
  editWords = decks[idx].words.map(w => ({ ...w })); // deep copy
  document.getElementById('editTitle').textContent = decks[idx].name;
  renderEditList();
  showScreen('edit');
}

function renderEditList() {
  document.getElementById('editCount').textContent = `${editWords.length}개`;
  const el = document.getElementById('editList');
  el.innerHTML = editWords.map((w, i) => `
    <div class="edit-row">
      <div class="edit-word">
        <input type="text" value="${esc(w.word)}" onchange="editWords[${i}].word=this.value" placeholder="영단어">
      </div>
      <div class="edit-meaning">
        <input type="text" value="${esc(w.meaning)}" onchange="editWords[${i}].meaning=this.value" placeholder="뜻">
      </div>
      <button class="edit-del" onclick="removeWord(${i})">✕</button>
    </div>
  `).join('');
}

function removeWord(idx) {
  editWords.splice(idx, 1);
  renderEditList();
}

function addWord() {
  editWords.push({ word: '', meaning: '' });
  renderEditList();
  // 스크롤 맨 아래로
  const el = document.getElementById('editList');
  el.scrollTop = el.scrollHeight;
  // 새 행의 첫 input에 포커스
  const inputs = el.querySelectorAll('.edit-row:last-child input');
  if (inputs[0]) inputs[0].focus();
}

function saveAndBack() {
  // 현재 input 값을 실시간 반영 (onchange가 아직 안 된 경우 대비)
  const rows = document.querySelectorAll('#editList .edit-row');
  const updated = [];
  rows.forEach((row, i) => {
    const inputs = row.querySelectorAll('input');
    const w = inputs[0].value.trim();
    const m = inputs[1].value.trim();
    if (w && m) updated.push({ word: w, meaning: m });
  });

  decks[editDeckIdx].words = updated;
  saveDecks();
  showScreen('home');
}

/* ============================================
   REVIEW SCREEN
   ============================================ */
function showReview() {
  const total = testQueue.length;
  const correct = total - reviewList.length;
  const pct = Math.round((correct / total) * 100);

  document.getElementById('reviewSub').textContent =
    reviewList.length === 0 ? '모두 정답! 🎉' : `오답 ${reviewList.length}개`;

  document.getElementById('statsBar').innerHTML = `
    <div class="stat"><div class="num">${total}</div><div class="label">전체</div></div>
    <div class="stat"><div class="num" style="color:var(--green)">${correct}</div><div class="label">정답</div></div>
    <div class="stat"><div class="num" style="color:var(--red)">${reviewList.length}</div><div class="label">오답</div></div>
    <div class="stat"><div class="num" style="color:var(--blue)">${pct}%</div><div class="label">정답률</div></div>
  `;

  const listEl = document.getElementById('reviewListEl');
  const actionsEl = document.getElementById('reviewActions');

  if (reviewList.length === 0) {
    listEl.innerHTML = '<div class="review-perfect"><span>🏆</span><p>틀린 단어가 없습니다!<br>다른 단어장도 도전해 보세요.</p></div>';
    actionsEl.innerHTML = '';
  } else {
    listEl.innerHTML = reviewList.map(w => `
      <div class="review-row">
        <div class="review-word">${esc(w.word)}</div>
        <div class="review-meaning">${esc(w.meaning)}</div>
      </div>
    `).join('');

    actionsEl.innerHTML = `
      <button onclick="downloadReviewXlsx()"><span class="act-icon">↓</span>엑셀 저장</button>
      <button onclick="addReviewToDeck()"><span class="act-icon">+</span>단어장 추가</button>
    `;
  }

  showScreen('review');
}

/* ============================================
   REVIEW: DOWNLOAD XLSX
   ============================================ */
function downloadReviewXlsx() {
  const data = [['Word', 'Meaning']];
  reviewList.forEach(w => data.push([w.word, w.meaning]));
  const ws = XLSX.utils.aoa_to_sheet(data);
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, 'Wrong Words');

  // 컬럼 너비 자동 조정
  ws['!cols'] = [{ wch: 20 }, { wch: 40 }];

  const wbout = XLSX.write(wb, { bookType: 'xlsx', type: 'array' });
  const blob = new Blob([wbout], { type: 'application/octet-stream' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `오답노트_${new Date().toLocaleDateString('ko-KR').replace(/\. /g,'-').replace('.','')}.xlsx`;
  a.click();
  URL.revokeObjectURL(url);
}

/* ============================================
   REVIEW: ADD TO DECK
   ============================================ */
function addReviewToDeck() {
  const options = decks.map((d, i) => `${i + 1}. ${d.name}`).join('\n');
  const msg = decks.length > 0
    ? `오답 ${reviewList.length}개를 어디에 추가할까요?\n\n${options}\n\n0. 새 단어장 만들기\n\n번호를 입력하세요:`
    : `오답 ${reviewList.length}개로 새 단어장을 만들까요?\n\n0을 입력하세요:`;

  const input = prompt(msg);
  if (input === null) return;
  const num = parseInt(input, 10);

  if (num === 0) {
    // 새 단어장 생성
    const name = prompt('새 단어장 이름을 입력하세요:', `오답노트`);
    if (!name || !name.trim()) return;
    const newDeck = {
      id: Date.now(),
      name: name.trim(),
      words: reviewList.map(w => ({ ...w })),
      createdAt: Date.now()
    };
    decks.push(newDeck);
    saveDecks();
    alert(`"${name.trim()}" 단어장이 생성되었습니다! (${reviewList.length}개)`);
  } else if (num >= 1 && num <= decks.length) {
    // 기존 단어장에 추가 (중복 제거)
    const target = decks[num - 1];
    const existing = new Set(target.words.map(w => w.word.toLowerCase()));
    let added = 0;
    reviewList.forEach(w => {
      if (!existing.has(w.word.toLowerCase())) {
        target.words.push({ ...w });
        existing.add(w.word.toLowerCase());
        added++;
      }
    });
    saveDecks();
    const skipped = reviewList.length - added;
    let msg2 = `"${target.name}"에 ${added}개 추가 완료!`;
    if (skipped > 0) msg2 += `\n(중복 ${skipped}개 제외)`;
    alert(msg2);
  } else {
    alert('올바른 번호를 입력해 주세요.');
  }
}
