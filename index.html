<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#0a0a0a" id="themeColorMeta">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="VocaFlash">
<link rel="manifest" href="manifest.json">
<link rel="icon" href="icon-192.png">
<link rel="apple-touch-icon" href="icon-192.png">
<title>Voca Flash</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#0a0a0a;
  --card:#161616;
  --card2:#1e1e1e;
  --card3:#1a1a1a;
  --border:#2a2a2a;
  --blue:#3b82f6;
  --blue2:#2563eb;
  --text:#e8e8e8;
  --text-strong:#ffffff;
  --sub:#888;
  --sub2:#a0a0a0;
  --faint:#444;
  --muted:#666;
  --green:#22c55e;
  --red:#ef4444;
  --gbg:#052e16;
  --rbg:#350a0a;
  --div:#222;
  --radius:14px;
}
body.light{
  --bg:#f6f7f9;
  --card:#ffffff;
  --card2:#f0f2f5;
  --card3:#ebeef2;
  --border:#e0e3e8;
  --text:#1a1a1a;
  --text-strong:#000000;
  --sub:#666;
  --sub2:#555;
  --faint:#b8b8b8;
  --muted:#888;
  --gbg:#dcfce7;
  --rbg:#fee2e2;
  --div:#e6e6e6;
}
html,body{height:100%;height:100dvh;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--text);overflow:hidden;touch-action:manipulation;transition:background .2s,color .2s}
button{font-family:inherit;cursor:pointer;border:none;outline:none;-webkit-appearance:none}
input,textarea{font-family:inherit}
input[type=file]{display:none}

/* ── Layout ── */
.screen{display:none;flex-direction:column;height:100vh;height:100dvh;padding:0 16px;padding-bottom:max(env(safe-area-inset-bottom),16px);overflow:hidden;position:absolute;inset:0}
.screen.active{display:flex}

/* ── HOME ── */
#home{padding-top:max(env(safe-area-inset-top),48px)}
.home-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:4px}
.home-actions{display:flex;gap:8px}
.icon-btn{width:38px;height:38px;border-radius:10px;background:var(--card);color:var(--sub);font-size:16px;display:flex;align-items:center;justify-content:center;border:1px solid var(--border)}
.icon-btn:active{background:var(--card2)}
.logo{text-align:center;margin-bottom:18px}
.logo h1{font-size:30px;font-weight:800;letter-spacing:.5px;background:linear-gradient(135deg,#60a5fa,#3b82f6);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.logo p{font-size:13px;color:var(--sub);margin-top:5px}
.streak-bar{display:flex;justify-content:center;gap:16px;margin-bottom:18px;flex-wrap:wrap}
.streak-chip{display:flex;align-items:center;gap:6px;background:var(--card);padding:8px 14px;border-radius:999px;font-size:13px;border:1px solid var(--border)}
.streak-chip .s-icon{font-size:15px}
.streak-chip .s-num{font-weight:800;color:var(--text-strong)}
.streak-chip .s-label{color:var(--sub);font-size:12px}
.upload-btn{width:100%;padding:15px;background:var(--blue);color:#fff;font-size:15px;font-weight:700;border-radius:var(--radius);display:flex;align-items:center;justify-content:center;gap:8px;transition:background .15s}
.upload-btn:active{background:var(--blue2)}
.upload-btn svg{width:20px;height:20px;fill:#fff}
.sort-row{display:flex;justify-content:space-between;align-items:center;margin-top:16px;margin-bottom:8px}
.sort-label{font-size:12px;color:var(--sub);font-weight:600}
.sort-tabs{display:flex;gap:4px;background:var(--card);border-radius:10px;padding:3px;border:1px solid var(--border)}
.sort-tab{padding:6px 12px;border-radius:7px;font-size:12px;font-weight:600;color:var(--sub);background:transparent}
.sort-tab.active{background:var(--blue);color:#fff}
.deck-list{flex:1;overflow-y:auto;padding-bottom:24px;-webkit-overflow-scrolling:touch}
.deck-card{background:var(--card);border-radius:var(--radius);padding:14px 16px;margin-bottom:10px;display:flex;align-items:center;gap:10px;border:1px solid var(--border)}
.deck-card:active{transform:scale(.98);transition:transform .1s}
.deck-body{flex:1;min-width:0}
.deck-name{font-size:16px;font-weight:700;color:var(--text-strong);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.deck-count{font-size:12px;color:var(--sub);margin-top:3px}
.deck-actions{display:flex;align-items:center;gap:6px;flex-shrink:0}
.deck-btn{width:32px;height:32px;border-radius:9px;background:var(--card3);color:var(--muted);font-size:14px;display:flex;align-items:center;justify-content:center;border:1px solid var(--border)}
.deck-btn:active{background:var(--card2)}
.deck-btn.del:active{color:var(--red)}
.deck-btn.edit:active{color:var(--blue)}
.deck-btn.merge:active{color:var(--green)}
.empty{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;color:var(--faint);text-align:center;gap:12px}
.empty-icon{font-size:52px}
.empty p{font-size:14px;line-height:1.6}

/* ── MODE MODAL ── */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:100;align-items:center;justify-content:center;padding:20px}
.modal-overlay.active{display:flex}
.modal-card{background:var(--card);border-radius:18px;padding:22px;max-width:360px;width:100%;border:1px solid var(--border)}
.modal-title{font-size:18px;font-weight:800;color:var(--text-strong);margin-bottom:4px;text-align:center}
.modal-sub{font-size:13px;color:var(--sub);text-align:center;margin-bottom:18px}
.mode-options{display:flex;flex-direction:column;gap:10px}
.mode-opt{background:var(--card2);padding:16px;border-radius:12px;border:1.5px solid var(--border);display:flex;align-items:center;gap:14px;transition:border-color .1s}
.mode-opt:active{transform:scale(.98);border-color:var(--blue)}
.mode-icon{font-size:28px;width:44px;text-align:center;flex-shrink:0}
.mode-info{flex:1;text-align:left}
.mode-name{font-size:15px;font-weight:700;color:var(--text-strong)}
.mode-desc{font-size:12px;color:var(--sub);margin-top:3px}
.modal-cancel{width:100%;margin-top:14px;padding:12px;background:transparent;color:var(--sub);font-size:14px;font-weight:600;border-radius:10px}
.modal-cancel:active{background:var(--card2)}
.modal-section-label{font-size:11px;font-weight:700;color:var(--sub);margin-bottom:8px;letter-spacing:.5px}
.dir-toggle{display:flex;gap:4px;background:var(--card2);border-radius:10px;padding:3px;border:1px solid var(--border);margin-bottom:14px}
.dir-btn{flex:1;padding:10px 6px;border-radius:8px;font-size:13px;font-weight:700;color:var(--sub);background:transparent;transition:background .15s,color .15s}
.dir-btn.active{background:var(--blue);color:#fff}
.word-hint{font-size:12px;color:var(--sub);margin-top:8px}
.deck-btn.share:active{color:var(--blue)}

/* ── TEST ── */
#test{padding-top:max(env(safe-area-inset-top),48px)}
.test-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.test-top-left{display:flex;align-items:center;gap:10px}
.quit-btn{width:34px;height:34px;border-radius:9px;background:var(--card);color:var(--sub);font-size:20px;display:flex;align-items:center;justify-content:center}
.quit-btn:active{background:var(--card2)}
.progress-txt{font-size:14px;font-weight:600;color:var(--sub)}
.skip-btn{padding:8px 16px;background:var(--card);border-radius:10px;font-size:13px;font-weight:600;color:var(--sub);transition:background .1s}
.skip-btn:active{background:var(--card2)}
.progress-bar{height:3px;background:var(--card3);border-radius:2px;overflow:hidden;margin-bottom:4px}
.progress-fill{height:100%;background:var(--blue);border-radius:2px;transition:width .2s ease-out}
.word-area{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:0 8px;position:relative}
.word-display{font-size:clamp(32px,10vw,52px);font-weight:800;color:var(--text-strong);text-align:center;word-break:break-word;line-height:1.2}
.choices{display:grid;grid-template-columns:1fr 1fr;gap:10px;padding-bottom:8px;flex-shrink:0}
.choice-btn{background:var(--card2);border-radius:var(--radius);padding:16px 10px;font-size:14px;font-weight:600;color:var(--text);text-align:center;min-height:64px;display:flex;align-items:center;justify-content:center;line-height:1.35;transition:transform .06s,background .12s;border:1.5px solid transparent;word-break:keep-all}
.choice-btn:active{transform:scale(.96)}
.choice-btn.correct{background:var(--gbg);border-color:var(--green);color:var(--green)}
.choice-btn.wrong{background:var(--rbg);border-color:var(--red);color:var(--red)}
.choice-btn.reveal{background:var(--gbg);border-color:var(--green);color:var(--green)}
.choice-btn.disabled{pointer-events:none}

/* ── TYPING MODE ── */
.typing-area{display:none;flex-direction:column;gap:10px;padding-bottom:8px;flex-shrink:0}
.typing-area.active{display:flex}
.typing-input{width:100%;background:var(--card2);border:1.5px solid var(--border);border-radius:var(--radius);padding:16px;font-size:16px;font-weight:600;color:var(--text);text-align:center;font-family:inherit}
.typing-input:focus{border-color:var(--blue);outline:none}
.typing-input.correct{border-color:var(--green);background:var(--gbg);color:var(--green)}
.typing-input.wrong{border-color:var(--red);background:var(--rbg);color:var(--red)}
.typing-answer{text-align:center;font-size:14px;color:var(--green);font-weight:600;min-height:20px;padding:4px}
.typing-submit{padding:15px;background:var(--blue);color:#fff;font-size:15px;font-weight:700;border-radius:var(--radius);display:flex;align-items:center;justify-content:center;gap:6px}
.typing-submit:active{background:var(--blue2)}
.typing-submit:disabled{opacity:.5;pointer-events:none}

/* ── COMBO BADGE (top-right only) ── */
.combo-badge{position:fixed;top:max(env(safe-area-inset-top),16px);right:16px;background:linear-gradient(135deg,#f59e0b,#ef4444);color:#fff;padding:6px 12px;border-radius:999px;font-size:13px;font-weight:800;box-shadow:0 4px 14px rgba(239,68,68,.4);opacity:0;transform:scale(.6) translateY(-6px);transition:all .22s cubic-bezier(.34,1.56,.64,1);pointer-events:none;z-index:200}
.combo-badge.show{opacity:1;transform:scale(1) translateY(0)}
.combo-badge.pop{animation:comboPop .35s cubic-bezier(.34,1.56,.64,1)}
@keyframes comboPop{0%{transform:scale(1)}50%{transform:scale(1.18)}100%{transform:scale(1)}}
.combo-icon{margin-right:3px}

/* ── TIMER ── */
.timer{font-size:13px;font-weight:700;color:var(--sub);background:var(--card);padding:6px 10px;border-radius:8px;min-width:44px;text-align:center}
.timer.warn{color:var(--red);background:var(--rbg)}

/* ── HOME TABS ── */
.tab-bar{display:flex;gap:4px;background:var(--card);border-radius:12px;padding:4px;border:1px solid var(--border);margin-bottom:14px}
.tab-btn{flex:1;padding:10px;border-radius:9px;font-size:14px;font-weight:700;color:var(--sub);background:transparent;transition:background .15s,color .15s}
.tab-btn.active{background:var(--blue);color:#fff}
@media(hover:hover){.tab-btn:not(.active):hover{background:var(--card2);color:var(--text)}}

/* ── SENTENCE TEST ── */
.sentence-area{display:none;flex:1;flex-direction:column;min-height:0;padding-top:6px}
.sentence-area.active{display:flex}
.sentence-meaning{font-size:clamp(18px,4.5vw,22px);font-weight:700;color:var(--text-strong);text-align:center;padding:14px 8px;line-height:1.5;flex-shrink:0}
.sentence-slots{background:var(--card);border-radius:12px;padding:14px 10px;min-height:80px;display:flex;flex-wrap:wrap;gap:6px;align-items:flex-start;border:1.5px dashed var(--border);margin-bottom:14px;flex-shrink:0}
.sentence-slots.correct{border-color:var(--green);background:var(--gbg)}
.sentence-slots.wrong{border-color:var(--red);background:var(--rbg)}
.sentence-bank{flex:1;overflow-y:auto;display:flex;flex-wrap:wrap;gap:6px;align-content:flex-start;padding-bottom:12px;-webkit-overflow-scrolling:touch}
.tok-btn{background:var(--card2);color:var(--text-strong);padding:10px 14px;border-radius:10px;font-size:15px;font-weight:600;border:1.5px solid var(--border);transition:all .12s;font-family:inherit}
.tok-btn:active{transform:scale(.94)}
@media(hover:hover){.tok-btn:hover{background:var(--card3);border-color:var(--blue)}}
.tok-btn.placed{background:var(--blue);color:#fff;border-color:var(--blue)}
.tok-btn.hidden-slot{visibility:hidden}
.sentence-check{padding:14px;background:var(--blue);color:#fff;font-size:15px;font-weight:700;border-radius:var(--radius);margin-top:6px;flex-shrink:0;transition:background .15s}
.sentence-check:disabled{opacity:.4;pointer-events:none}
@media(hover:hover){.sentence-check:not(:disabled):hover{background:var(--blue2)}}
.sentence-answer-reveal{font-size:13px;color:var(--green);font-weight:600;text-align:center;min-height:18px;margin-bottom:6px}

/* ── HOVER EFFECTS (desktop) ── */
@media(hover:hover){
  .icon-btn:hover{background:var(--card2);color:var(--text)}
  .upload-btn:hover{background:var(--blue2)}
  .deck-card:hover{border-color:var(--blue);cursor:pointer}
  .deck-btn:hover{background:var(--card2)}
  .deck-btn.del:hover{color:var(--red)}
  .deck-btn.edit:hover{color:var(--blue)}
  .deck-btn.merge:hover{color:var(--green)}
  .deck-btn.share:hover{color:var(--blue)}
  .sort-tab:not(.active):hover{color:var(--text)}
  .choice-btn:hover{background:var(--card3);border-color:var(--border)}
  .mode-opt:hover{border-color:var(--blue)}
  .dir-btn:not(.active):hover{color:var(--text)}
  .quit-btn:hover{background:var(--card2);color:var(--text)}
  .skip-btn:hover{background:var(--card2);color:var(--text)}
  .back-btn:hover{background:var(--card2);color:var(--text)}
  .typing-submit:hover{background:var(--blue2)}
  .save-btn:hover{background:var(--blue2)}
  .home-btn:hover{background:var(--blue2)}
  .add-word-btn:hover{background:var(--card3)}
  .modal-cancel:hover{background:var(--card2);color:var(--text)}
  .review-actions button:hover{background:var(--card3)}
  .edit-del:hover{color:var(--red)}
}

/* ── EDIT ── */
#edit{padding-top:max(env(safe-area-inset-top),48px)}
.edit-header{display:flex;align-items:center;gap:12px;margin-bottom:16px}
.back-btn{width:36px;height:36px;border-radius:10px;background:var(--card);color:var(--sub);font-size:20px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.back-btn:active{background:var(--card2)}
.edit-title{flex:1;min-width:0}
.edit-title input{width:100%;background:var(--card);border:1px solid var(--border);border-radius:10px;padding:10px 12px;color:var(--text-strong);font-size:17px;font-weight:700;font-family:inherit}
.edit-title input:focus{border-color:var(--blue);outline:none}
.edit-count{font-size:13px;color:var(--sub);flex-shrink:0}
.edit-list{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding-bottom:16px}
.edit-row{display:flex;align-items:center;gap:8px;padding:10px 0;border-bottom:1px solid var(--div)}
.edit-word{flex:1;min-width:0}
.edit-word input{width:100%;background:var(--card);border:1px solid var(--border);border-radius:8px;padding:8px 10px;color:var(--text-strong);font-size:14px;font-weight:600;font-family:inherit}
.edit-word input:focus{border-color:var(--blue);outline:none}
.edit-meaning{flex:2;min-width:0}
.edit-meaning input{width:100%;background:var(--card);border:1px solid var(--border);border-radius:8px;padding:8px 10px;color:var(--sub2);font-size:13px;font-family:inherit}
.edit-meaning input:focus{border-color:var(--blue);outline:none}
.edit-del{width:30px;height:30px;border-radius:8px;background:transparent;color:var(--faint);font-size:18px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.edit-del:active{color:var(--red)}
.time-limit-row{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--div);flex-shrink:0}
.time-limit-row label{font-size:13px;color:var(--sub);font-weight:600;flex-shrink:0}
.time-limit-row input{width:70px;background:var(--card);border:1px solid var(--border);border-radius:8px;padding:8px 10px;color:var(--text-strong);font-size:14px;font-weight:600;font-family:inherit;text-align:center}
.time-limit-row input:focus{border-color:var(--blue);outline:none}
.time-limit-row .tl-hint{font-size:11px;color:var(--sub);flex:1}
.edit-bottom{display:flex;gap:10px;flex-shrink:0;padding-top:12px}
.edit-bottom button{flex:1;padding:14px;border-radius:var(--radius);font-size:14px;font-weight:700}
.add-word-btn{background:var(--card2);color:var(--text);border:1px dashed var(--border)}
.add-word-btn:active{background:var(--card3)}
.save-btn{background:var(--blue);color:#fff}
.save-btn:active{background:var(--blue2)}

/* ── REVIEW ── */
#review{padding-top:max(env(safe-area-inset-top),48px)}
.review-header{text-align:center;margin-bottom:14px;flex-shrink:0}
.review-header h2{font-size:24px;font-weight:800;color:var(--text-strong)}
.review-header p{font-size:14px;color:var(--blue);font-weight:600;margin-top:4px}
.stats-bar{display:flex;justify-content:center;gap:20px;margin-bottom:12px;flex-shrink:0}
.stat{text-align:center}
.stat .num{font-size:22px;font-weight:800;color:var(--text-strong)}
.stat .label{font-size:11px;color:var(--sub);margin-top:2px}
.review-list{flex:1 1 0;min-height:0;overflow-y:auto;-webkit-overflow-scrolling:touch}
.review-row{display:flex;padding:13px 4px;border-bottom:1px solid var(--div)}
.review-word{width:32%;font-size:15px;font-weight:700;color:var(--text-strong);padding-right:10px;flex-shrink:0}
.review-meaning{width:68%;font-size:13px;color:var(--sub2);line-height:1.5}
.review-perfect{flex:1 1 0;min-height:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;color:var(--muted);text-align:center}
.review-perfect span{font-size:56px}
.review-perfect p{font-size:15px;line-height:1.6}
.review-bottom{flex-shrink:0;padding-top:10px}
.review-actions{display:flex;gap:8px;margin-bottom:8px}
.review-actions button{flex:1;padding:11px 6px;border-radius:var(--radius);font-size:12px;font-weight:700;display:flex;align-items:center;justify-content:center;gap:5px;background:var(--card2);color:var(--text);border:1px solid var(--border)}
.review-actions button:active{background:var(--card3)}
.review-actions .act-icon{font-size:15px}
.home-btn{width:100%;padding:14px;background:var(--blue);color:#fff;font-size:15px;font-weight:700;border-radius:var(--radius);transition:background .15s}
.home-btn:active{background:var(--blue2)}
</style>
</head>
<body>

<!-- ═══════════ HOME ═══════════ -->
<div id="home" class="screen active">
  <div class="home-top">
    <div style="width:38px"></div>
    <div class="home-actions">
      <button class="icon-btn" id="themeToggle" onclick="toggleTheme()" title="테마 전환">🌙</button>
    </div>
  </div>
  <div class="logo">
    <h1>⚡ Voca Flash</h1>
    <p>무한 반복으로 영단어 각인</p>
  </div>
  <div class="streak-bar" id="streakBar"></div>
  <button class="upload-btn" onclick="openUploadTypeModal()">
    <svg viewBox="0 0 24 24"><path d="M12 2a1 1 0 011 1v10.586l3.293-3.293a1 1 0 111.414 1.414l-5 5a1 1 0 01-1.414 0l-5-5a1 1 0 111.414-1.414L11 13.586V3a1 1 0 011-1zM5 20a1 1 0 110 2h14a1 1 0 110-2H5z"/></svg>
    엑셀 파일 업로드 (.xlsx)
  </button>
  <input type="file" id="fileInput" accept=".xlsx,.xls" onchange="handleFile(event)">
  <div class="tab-bar" style="margin-top:14px">
    <button class="tab-btn active" data-tab="word" onclick="setTab('word')">📘 단어</button>
    <button class="tab-btn" data-tab="sentence" onclick="setTab('sentence')">📝 문장</button>
  </div>
  <div class="sort-row" id="sortRow" style="display:none;margin-top:4px">
    <span class="sort-label">정렬</span>
    <div class="sort-tabs">
      <button class="sort-tab" data-sort="recent" onclick="setSort('recent')">최근</button>
      <button class="sort-tab" data-sort="created" onclick="setSort('created')">생성순</button>
      <button class="sort-tab" data-sort="name" onclick="setSort('name')">이름순</button>
    </div>
  </div>
  <div class="deck-list" id="deckList"></div>
</div>

<!-- ═══════════ UPLOAD TYPE MODAL ═══════════ -->
<div class="modal-overlay" id="uploadTypeModal">
  <div class="modal-card">

<!-- ═══════════ SheetJS CDN ═══════════ -->
<script src="https://cdn.sheetjs.com/xlsx-0.20.3/package/dist/xlsx.full.min.js"></script>

<script>
/* ============================================
   STATE
   ============================================ */
const STORAGE_KEY = 'vocaflash_decks';
const THEME_KEY = 'vocaflash_theme';
const SORT_KEY = 'vocaflash_sort';
const STREAK_KEY = 'vocaflash_streak';
const TAB_KEY = 'vocaflash_tab';
const TTS_KEY = 'vocaflash_tts';

let decks = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
// Migration: ensure 'type' field exists
decks.forEach(d => {
  if (!d.type) d.type = d.sentences ? 'sentence' : 'word';
  if (!d.timeLimit) d.timeLimit = 0;
});

let currentSort = localStorage.getItem(SORT_KEY) || 'recent';
let currentTab = localStorage.getItem(TAB_KEY) || 'word';
let ttsEnabled = localStorage.getItem(TTS_KEY) !== 'off';

// Test state
let testMode = 'choice'; // 'choice' | 'typing' | 'order'
let testDirection = 'normal'; // 'normal' | 'reverse'
let testQueue = [];
let testIdx = 0;
let testChoices = [];
let reviewList = [];
let currentDeck = null;
let currentDeckIdx = -1;
let feedbackLocked = false;

// Timer
let timerInterval = null;
let timerRemaining = 0;
let timerActive = false;

// Combo
let comboCount = 0;

// Edit state
let editDeckIdx = -1;
let editItems = [];

// Pending
let pendingDeckIdx = -1;
let pendingUploadType = 'word';

/* ============================================
   DECK HELPERS
   ============================================ */
function deckType(d) { return d.type || (d.sentences ? 'sentence' : 'word'); }
function deckItems(d) { return deckType(d) === 'sentence' ? (d.sentences || []) : (d.words || []); }
function deckItemLabel(d, item) {
  return deckType(d) === 'sentence' ? item.sentence : item.word;
}
function setDeckItems(d, arr) {
  if (deckType(d) === 'sentence') { d.sentences = arr; delete d.words; }
  else { d.words = arr; delete d.sentences; }
}

/* ============================================
   THEME
   ============================================ */
function applyTheme(theme) {
  if (theme === 'light') {
    document.body.classList.add('light');
    document.getElementById('themeToggle').textContent = '☀️';
    document.getElementById('themeColorMeta').setAttribute('content', '#f6f7f9');
  } else {
    document.body.classList.remove('light');
    document.getElementById('themeToggle').textContent = '🌙';
    document.getElementById('themeColorMeta').setAttribute('content', '#0a0a0a');
  }
}

function toggleTheme() {
  const cur = localStorage.getItem(THEME_KEY) || 'dark';
  const next = cur === 'dark' ? 'light' : 'dark';
  localStorage.setItem(THEME_KEY, next);
  applyTheme(next);
}

applyTheme(localStorage.getItem(THEME_KEY) || 'dark');

/* ============================================
   STREAK / DAILY COUNT
   ============================================ */
function getTodayKey() {
  const d = new Date();
  return `${d.getFullYear()}-${d.getMonth()+1}-${d.getDate()}`;
}

function loadStreak() {
  const raw = localStorage.getItem(STREAK_KEY);
  if (!raw) return { today: 0, streak: 0, lastDate: '', total: 0 };
  return JSON.parse(raw);
}

function saveStreak(s) {
  localStorage.setItem(STREAK_KEY, JSON.stringify(s));
}

/** 학습 1회(문제 1개) 풀었을 때 호출 */
function recordSolved() {
  const today = getTodayKey();
  const s = loadStreak();

  if (s.lastDate !== today) {
    // 날짜가 바뀌었을 때 연속일 처리
    if (s.lastDate) {
      const y = new Date();
      y.setDate(y.getDate() - 1);
      const yKey = `${y.getFullYear()}-${y.getMonth()+1}-${y.getDate()}`;
      s.streak = (s.lastDate === yKey) ? (s.streak || 1) + 1 : 1;
    } else {
      s.streak = 1;
    }
    s.today = 0;
    s.lastDate = today;
  }

  s.today = (s.today || 0) + 1;
  s.total = (s.total || 0) + 1;
  saveStreak(s);
}

function renderStreak() {
  const s = loadStreak();
  const today = getTodayKey();
  const todayCount = s.lastDate === today ? (s.today || 0) : 0;
  const streakDays = s.lastDate === today ? (s.streak || 0) : 0;

  const el = document.getElementById('streakBar');
  el.innerHTML = `
    <div class="streak-chip">
      <span class="s-icon">📘</span>
      <span class="s-num">${todayCount}</span>
      <span class="s-label">오늘 푼 문제</span>
    </div>
    <div class="streak-chip">
      <span class="s-icon">🔥</span>
      <span class="s-num">${streakDays}</span>
      <span class="s-label">일 연속</span>
    </div>
  `;
}

/* ============================================
   SCREEN NAV
   ============================================ */
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  if (id === 'home') {
    renderDecks();
    renderStreak();
  }
}

/* ============================================
   EXCEL PARSE
   ============================================ */
function openUploadTypeModal() {
  document.getElementById('uploadTypeModal').classList.add('active');
}
function closeUploadTypeModal() {
  document.getElementById('uploadTypeModal').classList.remove('active');
}
function pickUploadType(type) {
  pendingUploadType = type;
  closeUploadTypeModal();
  document.getElementById('fileInput').click();
}

function handleFile(e) {
  const file = e.target.files[0];
  if (!file) return;
  const type = pendingUploadType || 'word';
  const reader = new FileReader();
  reader.onload = function(evt) {
    try {
      const data = new Uint8Array(evt.target.result);
      const wb = XLSX.read(data, { type: 'array' });
      const sheet = wb.Sheets[wb.SheetNames[0]];
      const rows = XLSX.utils.sheet_to_json(sheet, { header: 1, defval: '' });

      const items = [];
      for (let i = 0; i < rows.length; i++) {
        const a = String(rows[i][0] || '').trim();
        const b = String(rows[i][1] || '').trim();
        if (!a || !b) continue;
        if (i === 0 && ['word','sentence'].includes(a.toLowerCase())) continue;
        if (type === 'sentence') items.push({ sentence: a, meaning: b });
        else items.push({ word: a, meaning: b });
      }

      if (items.length === 0) {
        alert('유효한 항목이 없습니다.\n1열: ' + (type==='sentence'?'문장':'단어') + ', 2열: 뜻');
        return;
      }

      const name = file.name.replace(/\.xlsx?$/i, '');
      const deck = {
        id: Date.now(),
        type,
        name,
        createdAt: Date.now(),
        lastStudiedAt: 0,
        timeLimit: 0
      };
      if (type === 'sentence') deck.sentences = items;
      else deck.words = items;

      decks.push(deck);
      saveDecks();
      currentTab = type;
      localStorage.setItem(TAB_KEY, currentTab);
      renderDecks();
    } catch (err) {
      alert('파일 읽기 오류: ' + err.message);
    }
  };
  reader.readAsArrayBuffer(file);
  e.target.value = '';
}

/* ============================================
   TAB
   ============================================ */
function setTab(tab) {
  currentTab = tab;
  localStorage.setItem(TAB_KEY, tab);
  document.querySelectorAll('.tab-btn').forEach(b => {
    b.classList.toggle('active', b.dataset.tab === tab);
  });
  renderDecks();
}

/* ============================================
   STORAGE
   ============================================ */
function saveDecks() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(decks));
}

/* ============================================
   SORT
   ============================================ */
function setSort(mode) {
  currentSort = mode;
  localStorage.setItem(SORT_KEY, mode);
  renderDecks();
}

function getSortedDecks() {
  const arr = decks
    .map((d, i) => ({ d, origIdx: i }))
    .filter(x => deckType(x.d) === currentTab);
  if (currentSort === 'name') {
    arr.sort((a, b) => a.d.name.localeCompare(b.d.name, 'ko'));
  } else if (currentSort === 'recent') {
    arr.sort((a, b) => (b.d.lastStudiedAt || 0) - (a.d.lastStudiedAt || 0));
  } else { // 'created'
    arr.sort((a, b) => (b.d.createdAt || 0) - (a.d.createdAt || 0));
  }
  return arr;
}

/* ============================================
   DECK LIST RENDER
   ============================================ */
function renderDecks() {
  // sort tabs active state
  document.querySelectorAll('.sort-tab').forEach(t => {
    t.classList.toggle('active', t.dataset.sort === currentSort);
  });
  document.querySelectorAll('.tab-btn').forEach(b => {
    b.classList.toggle('active', b.dataset.tab === currentTab);
  });

  const el = document.getElementById('deckList');
  const sortRow = document.getElementById('sortRow');
  const sorted = getSortedDecks();

  if (sorted.length === 0) {
    const msg = currentTab === 'sentence'
      ? '문장 암기장이 없습니다<br>엑셀 업로드 → 문장 암기 선택'
      : '단어장이 없습니다<br>엑셀 파일을 업로드해 주세요';
    const icon = currentTab === 'sentence' ? '📝' : '📚';
    el.innerHTML = `<div class="empty"><span class="empty-icon">${icon}</span><p>${msg}</p></div>`;
    sortRow.style.display = 'none';
    return;
  }

  sortRow.style.display = sorted.length >= 2 ? 'flex' : 'none';

  const unit = currentTab === 'sentence' ? '문장' : '단어';
  el.innerHTML = sorted.map(({ d, origIdx }) => {
    const cnt = deckItems(d).length;
    const tl = d.timeLimit ? ` · ⏱${d.timeLimit}초` : '';
    return `
    <div class="deck-card">
      <div class="deck-body" onclick="openModeModal(${origIdx})">
        <div class="deck-name">${esc(d.name)}</div>
        <div class="deck-count">${cnt}개 ${unit}${tl}${d.lastStudiedAt ? ` · ${formatAgo(d.lastStudiedAt)}` : ''}</div>
      </div>
      <div class="deck-actions">
        <button class="deck-btn share" onclick="shareDeck(${origIdx})" title="링크 공유">🔗</button>
        <button class="deck-btn merge" onclick="mergeDeck(${origIdx})">⊕</button>
        <button class="deck-btn edit" onclick="openEdit(${origIdx})">✎</button>
        <button class="deck-btn del" onclick="deleteDeck(${origIdx})">✕</button>
      </div>
    </div>`;
  }).join('');
}

function formatAgo(ts) {
  const diff = Date.now() - ts;
  const m = 60*1000, h = 60*m, d = 24*h;
  if (diff < h) return '방금 전';
  if (diff < d) return `${Math.floor(diff/h)}시간 전`;
  if (diff < 7*d) return `${Math.floor(diff/d)}일 전`;
  return new Date(ts).toLocaleDateString('ko-KR');
}

function deleteDeck(idx) {
  if (!confirm(`"${decks[idx].name}" 단어장을 삭제할까요?`)) return;
  decks.splice(idx, 1);
  saveDecks();
  renderDecks();
}

function mergeDeck(idx) {
  const target = decks[idx];
  const type = deckType(target);
  const others = decks
    .map((d, i) => ({ d, i }))
    .filter(x => x.i !== idx && deckType(x.d) === type);

  if (others.length === 0) {
    alert('합칠 동일 종류의 단어장이 없습니다.');
    return;
  }

  const options = others.map((x, n) => `${n + 1}. ${x.d.name} (${deckItems(x.d).length}개)`).join('\n');
  const input = prompt(`"${target.name}"에 합칠 번호를 선택하세요:\n\n${options}`);
  if (input === null) return;
  const num = parseInt(input, 10);
  if (num < 1 || num > others.length) { alert('올바른 번호를 입력해 주세요.'); return; }

  const source = others[num - 1].d;
  const sourceIdx = others[num - 1].i;
  const tItems = deckItems(target);
  const sItems = deckItems(source);
  const keyOf = x => deckItemLabel(target, x).toLowerCase();
  const existing = new Set(tItems.map(keyOf));

  let added = 0;
  sItems.forEach(it => {
    if (!existing.has(deckItemLabel(source, it).toLowerCase())) {
      tItems.push({ ...it });
      existing.add(deckItemLabel(source, it).toLowerCase());
      added++;
    }
  });
  setDeckItems(target, tItems);

  const skipped = sItems.length - added;
  const delSource = confirm(
    `${added}개 추가 완료!${skipped > 0 ? ` (중복 ${skipped}개 제외)` : ''}\n\n"${source.name}" 원본을 삭제할까요?`
  );
  if (delSource) decks.splice(sourceIdx, 1);

  saveDecks();
  renderDecks();
}

/* ============================================
   SHARE DECK (URL)
   ============================================ */
function shareDeck(idx) {
  const d = decks[idx];
  const payload = { n: d.name, t: deckType(d), i: deckItems(d), tl: d.timeLimit || 0 };
  let encoded;
  try {
    encoded = btoa(unescape(encodeURIComponent(JSON.stringify(payload))));
  } catch(e) { alert('공유 링크 생성 실패'); return; }
  const url = `${location.origin}${location.pathname}?deck=${encoded}`;

  if (navigator.clipboard) {
    navigator.clipboard.writeText(url).then(() => {
      alert('📋 링크가 복사됐습니다!\n친구에게 공유하면 바로 단어장을 가져올 수 있어요.');
    }).catch(() => { prompt('이 링크를 복사해서 공유하세요:', url); });
  } else {
    prompt('이 링크를 복사해서 공유하세요:', url);
  }
}

function checkImportFromUrl() {
  const params = new URLSearchParams(location.search);
  const encoded = params.get('deck');
  if (!encoded) return;
  try {
    const p = JSON.parse(decodeURIComponent(escape(atob(encoded))));
    if (!p.n || !Array.isArray(p.i) || p.i.length === 0) return;
    history.replaceState({}, '', location.pathname);

    const type = p.t === 'sentence' ? 'sentence' : 'word';
    const items = p.i.map(it => {
      if (type === 'sentence') return { sentence: String(it.sentence||''), meaning: String(it.meaning||'') };
      return { word: String(it.word||''), meaning: String(it.meaning||'') };
    }).filter(it => (it.sentence || it.word) && it.meaning);
    if (items.length === 0) return;

    if (!confirm(`"${p.n}" 단어장을 가져올까요?\n(${items.length}개 항목)`)) return;

    const deck = {
      id: Date.now(),
      type,
      name: p.n,
      createdAt: Date.now(),
      lastStudiedAt: 0,
      timeLimit: p.tl || 0
    };
    if (type === 'sentence') deck.sentences = items;
    else deck.words = items;
    decks.push(deck);
    saveDecks();
    currentTab = type;
    localStorage.setItem(TAB_KEY, currentTab);
    renderDecks();
    alert(`"${p.n}" 단어장이 추가됐습니다!`);
  } catch(e) { /* ignore */ }
}

function esc(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

/* ============================================
   SHUFFLE UTIL
   ============================================ */
function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

/* ============================================
   MODE MODAL
   ============================================ */
function openModeModal(deckIdx) {
  const deck = decks[deckIdx];
  if (!deck) return;
  const type = deckType(deck);
  const items = deckItems(deck);
  if (type === 'word' && items.length < 4) { alert('최소 4개 이상의 단어가 필요합니다.'); return; }
  if (type === 'sentence' && items.length < 1) { alert('문장이 비어있습니다.'); return; }

  pendingDeckIdx = deckIdx;
  const count = Math.min(500, items.length);
  const unit = type === 'sentence' ? '문장' : '문제';
  document.getElementById('modeSub').textContent = `${deck.name} · ${count}${unit}`;

  // Show appropriate options
  document.getElementById('modeWordOptions').style.display = type === 'word' ? '' : 'none';
  document.getElementById('modeSentenceOptions').style.display = type === 'sentence' ? '' : 'none';

  // Sync direction UI
  document.getElementById('dirNormal').classList.toggle('active', testDirection === 'normal');
  document.getElementById('dirReverse').classList.toggle('active', testDirection === 'reverse');

  document.getElementById('modeModal').classList.add('active');
}

function closeModeModal() {
  document.getElementById('modeModal').classList.remove('active');
  pendingDeckIdx = -1;
}

function setDirection(dir) {
  testDirection = dir;
  document.getElementById('dirNormal').classList.toggle('active', dir === 'normal');
  document.getElementById('dirReverse').classList.toggle('active', dir === 'reverse');
}

function confirmMode(mode) {
  const deckIdx = pendingDeckIdx;
  closeModeModal();
  testMode = mode;
  if (mode === 'order') startSentenceTest(deckIdx);
  else startTest(deckIdx);
}

/* ============================================
   START TEST
   ============================================ */
function startTest(deckIdx) {
  currentDeck = decks[deckIdx];
  currentDeckIdx = deckIdx;
  if (!currentDeck || (currentDeck.words || []).length < 4) {
    alert('최소 4개 이상의 단어가 필요합니다.');
    return;
  }

  const items = currentDeck.words;
  const indices = shuffle(Array.from({ length: items.length }, (_, i) => i));
  testQueue = indices.slice(0, Math.min(500, indices.length));
  testIdx = 0;
  reviewList = [];
  feedbackLocked = false;
  comboCount = 0;
  hideCombo();

  // Show word test UI, hide sentence UI
  document.getElementById('wordArea').style.display = '';
  document.getElementById('sentenceArea').classList.remove('active');
  document.getElementById('choicesGrid').style.display = (testMode === 'choice') ? 'grid' : 'none';
  document.getElementById('typingArea').classList.toggle('active', testMode === 'typing');
  document.getElementById('ttsToggle').textContent = ttsEnabled ? '🔊' : '🔇';

  showScreen('test');
  renderQuestion();
}

/* ============================================
   QUIT TEST
   ============================================ */
function quitTest() {
  if (testIdx > 0 && !confirm('테스트를 종료할까요?\n진행 상황이 사라집니다.')) return;
  stopTimer();
  if (window.speechSynthesis) window.speechSynthesis.cancel();
  hideCombo();
  showScreen('home');
}

/* ============================================
   COMBO (simplified: top-right badge only)
   ============================================ */
function hideCombo() {
  document.getElementById('comboBadge').classList.remove('show', 'pop');
}

function updateCombo(isCorrect) {
  const badge = document.getElementById('comboBadge');
  const numEl = document.getElementById('comboNum');
  if (!isCorrect) { comboCount = 0; hideCombo(); return; }
  comboCount++;
  if (comboCount >= 5) {
    numEl.textContent = comboCount;
    badge.classList.add('show');
    badge.classList.remove('pop');
    void badge.offsetWidth;
    badge.classList.add('pop');
  }
}

/* ============================================
   TTS
   ============================================ */
function speakWord(text, lang) {
  if (!ttsEnabled) return;
  if (!window.speechSynthesis) return;
  try {
    window.speechSynthesis.cancel();
    const u = new SpeechSynthesisUtterance(String(text));
    u.lang = lang || 'en-US';
    u.rate = 0.95;
    window.speechSynthesis.speak(u);
  } catch(e) {}
}
function toggleTts() {
  ttsEnabled = !ttsEnabled;
  localStorage.setItem(TTS_KEY, ttsEnabled ? 'on' : 'off');
  document.getElementById('ttsToggle').textContent = ttsEnabled ? '🔊' : '🔇';
  if (!ttsEnabled && window.speechSynthesis) window.speechSynthesis.cancel();
}
function replaySpeak() {
  if (!currentDeck) return;
  const idx = testQueue[testIdx];
  if (idx == null) return;
  const items = currentDeck.words || currentDeck.sentences || [];
  const item = items[idx];
  if (!item) return;
  const isReverse = testDirection === 'reverse';
  const txt = deckType(currentDeck) === 'sentence' ? item.sentence : (isReverse ? item.meaning : item.word);
  const lang = (deckType(currentDeck) === 'sentence' || !isReverse) ? 'en-US' : 'ko-KR';
  speakWord(txt, lang);
}

/* ============================================
   TIMER
   ============================================ */
function stopTimer() {
  if (timerInterval) { clearInterval(timerInterval); timerInterval = null; }
  timerActive = false;
  const el = document.getElementById('timer');
  el.style.display = 'none';
  el.classList.remove('warn');
}
function startTimer() {
  stopTimer();
  const tl = (currentDeck && currentDeck.timeLimit) || 0;
  if (tl <= 0) return;
  timerRemaining = tl;
  timerActive = true;
  const el = document.getElementById('timer');
  el.style.display = '';
  el.textContent = `⏱ ${timerRemaining}s`;
  el.classList.toggle('warn', timerRemaining <= 3);
  timerInterval = setInterval(() => {
    if (feedbackLocked) return;
    timerRemaining--;
    el.textContent = `⏱ ${timerRemaining}s`;
    el.classList.toggle('warn', timerRemaining <= 3);
    if (timerRemaining <= 0) {
      clearInterval(timerInterval);
      timerInterval = null;
      timerActive = false;
      handleTimeout();
    }
  }, 1000);
}
function handleTimeout() {
  if (testMode === 'order') { sHandleSkip(true); }
  else { handleSkip(true); }
}

/* ============================================
   RENDER QUESTION
   ============================================ */
function renderQuestion() {
  const total = testQueue.length;
  const progress = testIdx + 1;
  const wordObj = currentDeck.words[testQueue[testIdx]];
  const isReverse = testDirection === 'reverse';

  document.getElementById('progressTxt').textContent = `${progress} / ${total}`;
  document.getElementById('progressFill').style.width = `${(progress / total) * 100}%`;

  const displayText = isReverse ? wordObj.meaning : wordObj.word;
  document.getElementById('wordDisplay').textContent = displayText;
  document.getElementById('wordHint').textContent = isReverse ? '단어를 맞히세요' : '뜻을 맞히세요';

  // TTS (only speak English)
  const lang = isReverse ? 'ko-KR' : 'en-US';
  speakWord(displayText, lang);

  if (testMode === 'choice') {
    const correctAnswer = isReverse ? wordObj.word : wordObj.meaning;
    const wrongPool = [];
    for (let i = 0; i < currentDeck.words.length; i++) {
      if (i !== testQueue[testIdx]) {
        wrongPool.push(isReverse ? currentDeck.words[i].word : currentDeck.words[i].meaning);
      }
    }
    const wrongs = shuffle(wrongPool).slice(0, 3);
    testChoices = shuffle([correctAnswer, ...wrongs]);

    const grid = document.getElementById('choicesGrid');
    grid.innerHTML = testChoices.map((c, i) => `
      <button class="choice-btn" onclick="handleChoice(${i})">${esc(c)}</button>
    `).join('');
  } else {
    const input = document.getElementById('typingInput');
    const ans = document.getElementById('typingAnswer');
    input.value = '';
    input.classList.remove('correct', 'wrong');
    input.disabled = false;
    ans.textContent = '';
    input.placeholder = isReverse ? '단어를 입력하세요' : '뜻을 입력하세요';
    document.getElementById('typingSubmit').disabled = false;
    setTimeout(() => input.focus(), 50);
  }

  startTimer();
}

/* ============================================
   HANDLE CHOICE
   ============================================ */
function handleChoice(idx) {
  if (feedbackLocked) return;

  const wordObj = currentDeck.words[testQueue[testIdx]];
  const selected = testChoices[idx];
  const correctAnswer = testDirection === 'reverse' ? wordObj.word : wordObj.meaning;
  const isCorrect = selected === correctAnswer;

  recordSolved();
  updateCombo(isCorrect);

  if (isCorrect) {
    stopTimer();
    goNext();
  } else {
    feedbackLocked = true;
    stopTimer();
    reviewList.push(wordObj);

    const btns = document.querySelectorAll('.choice-btn');
    btns.forEach((btn, i) => {
      btn.classList.add('disabled');
      if (i === idx) btn.classList.add('wrong');
      if (testChoices[i] === correctAnswer) btn.classList.add('correct');
    });

    setTimeout(() => {
      feedbackLocked = false;
      goNext();
    }, 500);
  }
}

/* ============================================
   HANDLE TYPING SUBMIT
   ============================================ */
/* ============================================
   LENIENT TYPING MATCH
   ============================================ */
const KOR_PARTICLES_2 = ['에서','으로','로서','로써','부터','까지','에게','한테','께서','보다','처럼','같이','마다','조차','마저','이나','이라','라고'];
const KOR_PARTICLES_1 = ['을','를','이','가','은','는','의','에','도','만','와','과','로','나','뿐','며','고','면','서'];

function stripKorTail(t) {
  let changed = true;
  while (changed && t.length > 1) {
    changed = false;
    for (const p of KOR_PARTICLES_2) {
      if (t.endsWith(p) && t.length > p.length + 1) {
        t = t.slice(0, -p.length); changed = true; break;
      }
    }
    if (changed) continue;
    if (t.length > 1 && KOR_PARTICLES_1.includes(t.slice(-1))) {
      t = t.slice(0, -1); changed = true;
    }
  }
  return t;
}

function splitParts(s) {
  return String(s).split(/[,，;；·ㆍ\n]+/).map(x => x.trim()).filter(Boolean);
}

function stripParens(s) {
  return String(s).replace(/\([^)]*\)/g, ' ').replace(/\[[^\]]*\]/g, ' ');
}

function normalizeLoose(s, dropParens) {
  let t = String(s).toLowerCase();
  if (dropParens) t = stripParens(t);
  else t = t.replace(/[()\[\]]/g, ' ');
  t = t.replace(/[.,;!?~'"`\/]+/g, ' ');
  const toks = t.split(/\s+/).filter(Boolean).map(stripKorTail);
  return toks.join('');
}

function buildCorrectVariants(meaning) {
  const set = new Set();
  [meaning, ...splitParts(meaning)].forEach(src => {
    const a = normalizeLoose(src, true);
    const b = normalizeLoose(src, false);
    if (a) set.add(a);
    if (b) set.add(b);
  });
  set.delete('');
  return set;
}

function normalizeEnglish(s) {
  return String(s).toLowerCase().replace(/\s+/g, ' ').trim()
    .replace(/[.,;!?'"`]/g, '').replace(/\s+/g, '');
}

function checkTypingAnswer(userInput, correctAnswer, isEnglish) {
  if (!userInput.trim()) return false;
  if (isEnglish) {
    const c = normalizeEnglish(correctAnswer);
    return splitParts(userInput).some(u => normalizeEnglish(u) === c)
      || normalizeEnglish(userInput) === c;
  }
  const correctSet = buildCorrectVariants(correctAnswer);
  const userParts = [userInput, ...splitParts(userInput)];
  for (const up of userParts) {
    const a = normalizeLoose(up, true);
    const b = normalizeLoose(up, false);
    if (a && correctSet.has(a)) return true;
    if (b && correctSet.has(b)) return true;
  }
  return false;
}

function handleTypingSubmit() {
  if (feedbackLocked) return;
  const input = document.getElementById('typingInput');
  const userAnswer = input.value.trim();
  if (!userAnswer) return;

  const wordObj = currentDeck.words[testQueue[testIdx]];
  const isReverse = testDirection === 'reverse';
  const correctText = isReverse ? wordObj.word : wordObj.meaning;
  const isCorrect = checkTypingAnswer(userAnswer, correctText, isReverse);

  recordSolved();
  updateCombo(isCorrect);
  stopTimer();

  feedbackLocked = true;
  input.disabled = true;
  document.getElementById('typingSubmit').disabled = true;

  if (isCorrect) {
    input.classList.add('correct');
    setTimeout(() => { feedbackLocked = false; goNext(); }, 300);
  } else {
    reviewList.push(wordObj);
    input.classList.add('wrong');
    document.getElementById('typingAnswer').textContent = `✓ ${correctText}`;
    setTimeout(() => { feedbackLocked = false; goNext(); }, 1400);
  }
}

/* ============================================
   HANDLE SKIP
   ============================================ */
function handleSkip(isTimeout) {
  if (feedbackLocked) return;
  feedbackLocked = true;
  stopTimer();

  const wordObj = currentDeck.words[testQueue[testIdx]];
  reviewList.push(wordObj);
  recordSolved();
  updateCombo(false);

  const correctText = testDirection === 'reverse' ? wordObj.word : wordObj.meaning;

  if (testMode === 'choice') {
    const btns = document.querySelectorAll('.choice-btn');
    btns.forEach((btn, i) => {
      btn.classList.add('disabled');
      if (testChoices[i] === correctText) btn.classList.add('reveal');
    });
  } else {
    const input = document.getElementById('typingInput');
    input.disabled = true;
    input.classList.add('wrong');
    document.getElementById('typingSubmit').disabled = true;
    document.getElementById('typingAnswer').textContent = `✓ ${correctText}`;
  }

  setTimeout(() => {
    feedbackLocked = false;
    goNext();
  }, testMode === 'choice' ? 600 : 1400);
}

/* ============================================
   GO NEXT / FINISH
   ============================================ */
function goNext() {
  testIdx++;
  if (testIdx >= testQueue.length) {
    stopTimer();
    if (window.speechSynthesis) window.speechSynthesis.cancel();
    if (currentDeckIdx >= 0 && decks[currentDeckIdx]) {
      decks[currentDeckIdx].lastStudiedAt = Date.now();
      saveDecks();
    }
    showReview();
    return;
  }
  if (testMode === 'order') sRenderQuestion();
  else renderQuestion();
}

/* ============================================
   EDIT DECK
   ============================================ */
function openEdit(idx) {
  editDeckIdx = idx;
  const d = decks[idx];
  const type = deckType(d);
  editItems = deckItems(d).map(it => ({ ...it }));
  document.getElementById('editTitleInput').value = d.name;
  document.getElementById('editTimeLimit').value = d.timeLimit || '';
  renderEditList();
  showScreen('edit');
}

function renderEditList() {
  const d = decks[editDeckIdx];
  const type = deckType(d);
  document.getElementById('editCount').textContent = `${editItems.length}개`;
  const el = document.getElementById('editList');
  const primaryField = type === 'sentence' ? 'sentence' : 'word';
  const primaryPh = type === 'sentence' ? '영어 문장' : '영단어';
  el.innerHTML = editItems.map((it, i) => `
    <div class="edit-row">
      <div class="edit-word">

      </div>

function removeWord(idx) {

  renderEditList();
}

function addWord() {
  const type = deckType(decks[editDeckIdx]);
  editItems.push(type === 'sentence' ? { sentence: '', meaning: '' } : { word: '', meaning: '' });
  renderEditList();
  const el = document.getElementById('editList');
  el.scrollTop = el.scrollHeight;
  const inputs = el.querySelectorAll('.edit-row:last-child input');
  if (inputs[0]) inputs[0].focus();
}

function saveAndBack() {
  const d = decks[editDeckIdx];
  const type = deckType(d);
  const newName = document.getElementById('editTitleInput').value.trim();
  if (newName) d.name = newName;

  const tl = parseInt(document.getElementById('editTimeLimit').value, 10);
  d.timeLimit = (isNaN(tl) || tl < 0) ? 0 : Math.min(300, tl);

  const updated = editItems
    .map(it => type === 'sentence'
      ? { sentence: String(it.sentence || '').trim(), meaning: String(it.meaning || '').trim() }
      : { word: String(it.word || '').trim(), meaning: String(it.meaning || '').trim() })
    .filter(it => (it.sentence || it.word) && it.meaning);
  setDeckItems(d, updated);

  saveDecks();
  showScreen('home');
}

/* ============================================
   SENTENCE TEST (order mode)
   ============================================ */
let sTokens = [];     // correct tokens
let sBank = [];       // [{id, token, placed}]
let sSelected = [];   // array of bank ids in chosen order

function tokenizeSentence(s) {
  return String(s).trim().split(/\s+/).filter(Boolean);
}

function startSentenceTest(deckIdx) {
  currentDeck = decks[deckIdx];
  currentDeckIdx = deckIdx;
  const items = currentDeck.sentences || [];
  if (items.length < 1) { alert('문장이 없습니다.'); return; }

  const indices = shuffle(Array.from({ length: items.length }, (_, i) => i));
  testQueue = indices.slice(0, Math.min(500, indices.length));
  testIdx = 0;
  reviewList = [];
  feedbackLocked = false;
  comboCount = 0;
  hideCombo();

  // UI: hide word, show sentence
  document.getElementById('wordArea').style.display = 'none';
  document.getElementById('choicesGrid').style.display = 'none';
  document.getElementById('typingArea').classList.remove('active');
  document.getElementById('sentenceArea').classList.add('active');
  document.getElementById('ttsToggle').textContent = ttsEnabled ? '🔊' : '🔇';

  showScreen('test');
  sRenderQuestion();
}

function sRenderQuestion() {
  const total = testQueue.length;
  const progress = testIdx + 1;
  const item = currentDeck.sentences[testQueue[testIdx]];

  document.getElementById('progressTxt').textContent = `${progress} / ${total}`;
  document.getElementById('progressFill').style.width = `${(progress / total) * 100}%`;
  document.getElementById('sMeaning').textContent = item.meaning;
  document.getElementById('sRevealAns').textContent = '';
  document.getElementById('sCheckBtn').disabled = true;

  sTokens = tokenizeSentence(item.sentence);
  // Build bank: preserve token, shuffle order
  const indexed = sTokens.map((t, i) => ({ id: i, token: t, placed: false }));
  sBank = shuffle(indexed);
  sSelected = [];

  renderSentenceUI();
  speakWord(item.sentence, 'en-US');
  startTimer();
}

function renderSentenceUI() {
  const slots = document.getElementById('sSlots');
  const bank = document.getElementById('sBank');

  // Slots = chosen tokens (in chosen order)
  slots.innerHTML = sSelected.length === 0
    ? '<span style="color:var(--sub);font-size:13px;padding:8px">여기에 단어를 순서대로 놓으세요</span>'
    : sSelected.map(bid => {
        const b = sBank.find(x => x.id === bid);
        return `<button class="tok-btn placed" onclick="sUnplace(${bid})">${esc(b.token)}</button>`;
      }).join('');

  // Bank: hide placed ones
  bank.innerHTML = sBank.map(b => {
    if (b.placed) return `<button class="tok-btn hidden-slot">${esc(b.token)}</button>`;
    return `<button class="tok-btn" onclick="sPlace(${b.id})">${esc(b.token)}</button>`;
  }).join('');

  document.getElementById('sCheckBtn').disabled = sSelected.length !== sTokens.length || feedbackLocked;
  slots.classList.remove('correct','wrong');
}

function sPlace(id) {
  if (feedbackLocked) return;
  const b = sBank.find(x => x.id === id);
  if (!b || b.placed) return;
  b.placed = true;
  sSelected.push(id);
  renderSentenceUI();
  if (sSelected.length === sTokens.length) {
    // Auto-check
    sCheckAnswer();
  }
}

function sUnplace(id) {
  if (feedbackLocked) return;
  const b = sBank.find(x => x.id === id);
  if (!b || !b.placed) return;
  b.placed = false;
  sSelected = sSelected.filter(x => x !== id);
  renderSentenceUI();
}

function sCheckAnswer() {
  if (feedbackLocked) return;
  if (sSelected.length !== sTokens.length) return;
  feedbackLocked = true;
  stopTimer();

  const item = currentDeck.sentences[testQueue[testIdx]];
  // Check by original id order: sSelected should be [0,1,2,...]
  const isCorrect = sSelected.every((id, i) => id === i);

  recordSolved();
  updateCombo(isCorrect);

  const slots = document.getElementById('sSlots');
  if (isCorrect) {
    slots.classList.add('correct');
    document.getElementById('sRevealAns').textContent = `✓ ${item.sentence}`;
    setTimeout(() => { feedbackLocked = false; goNext(); }, 700);
  } else {
    reviewList.push(item);
    slots.classList.add('wrong');
    document.getElementById('sRevealAns').textContent = `✓ ${item.sentence}`;
    setTimeout(() => { feedbackLocked = false; goNext(); }, 1800);
  }
}

function sHandleSkip(isTimeout) {
  if (feedbackLocked) return;
  feedbackLocked = true;
  stopTimer();
  const item = currentDeck.sentences[testQueue[testIdx]];
  reviewList.push(item);
  recordSolved();
  updateCombo(false);
  document.getElementById('sSlots').classList.add('wrong');
  document.getElementById('sRevealAns').textContent = `✓ ${item.sentence}`;
  setTimeout(() => { feedbackLocked = false; goNext(); }, 1800);
}

/* ============================================
   REVIEW SCREEN
   ============================================ */
function showReview() {
  const total = testQueue.length;
  const correct = total - reviewList.length;
  const pct = Math.round((correct / total) * 100);

  document.getElementById('reviewSub').textContent =
    reviewList.length === 0 ? '모두 정답! 🎉' : `오답 ${reviewList.length}개`;

  document.getElementById('statsBar').innerHTML = `
    <div class="stat"><div class="num">${total}</div><div class="label">전체</div></div>
    <div class="stat"><div class="num" style="color:var(--green)">${correct}</div><div class="label">정답</div></div>
    <div class="stat"><div class="num" style="color:var(--red)">${reviewList.length}</div><div class="label">오답</div></div>
    <div class="stat"><div class="num" style="color:var(--blue)">${pct}%</div><div class="label">정답률</div></div>
  `;

  const listEl = document.getElementById('reviewListEl');
  const actionsEl = document.getElementById('reviewActions');

  if (reviewList.length === 0) {
    listEl.innerHTML = '<div class="review-perfect"><span>🏆</span><p>틀린 항목이 없습니다!<br>다른 단어장도 도전해 보세요.</p></div>';
    actionsEl.innerHTML = '';
  } else {
    const isSentence = deckType(currentDeck) === 'sentence';
    listEl.innerHTML = reviewList.map(w => {
      const primary = isSentence ? w.sentence : w.word;
      return `
        <div class="review-row">
          <div class="review-word"${isSentence ? ' style="width:48%"' : ''}>${esc(primary)}</div>
          <div class="review-meaning"${isSentence ? ' style="width:52%"' : ''}>${esc(w.meaning)}</div>
        </div>`;
    }).join('');

    actionsEl.innerHTML = `
      <button onclick="downloadReviewXlsx()"><span class="act-icon">↓</span>엑셀 저장</button>
      <button onclick="addReviewToDeck()"><span class="act-icon">+</span>단어장 추가</button>
    `;
  }

  showScreen('review');
}

/* ============================================
   REVIEW: DOWNLOAD XLSX
   ============================================ */
function downloadReviewXlsx() {
  const isSentence = deckType(currentDeck) === 'sentence';
  const header = isSentence ? ['Sentence','Meaning'] : ['Word','Meaning'];
  const data = [header];
  reviewList.forEach(w => data.push([isSentence ? w.sentence : w.word, w.meaning]));
  const ws = XLSX.utils.aoa_to_sheet(data);
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, 'Wrong');
  ws['!cols'] = [{ wch: isSentence ? 40 : 20 }, { wch: 40 }];

  const wbout = XLSX.write(wb, { bookType: 'xlsx', type: 'array' });
  const blob = new Blob([wbout], { type: 'application/octet-stream' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `오답노트_${new Date().toLocaleDateString('ko-KR').replace(/\. /g,'-').replace('.','')}.xlsx`;
  a.click();
  URL.revokeObjectURL(url);
}

/* ============================================
   REVIEW: ADD TO DECK
   ============================================ */
function addReviewToDeck() {
  const today = new Date().toLocaleDateString('ko-KR').replace(/\. /g,'.').replace(/\.$/,'');
  const deckName = currentDeck ? currentDeck.name : '';
  const type = deckType(currentDeck);
  const newDeck = {
    id: Date.now(),
    type,
    name: `${deckName} 오답 ${today}`,
    createdAt: Date.now(),
    lastStudiedAt: 0,
    timeLimit: 0
  };
  if (type === 'sentence') newDeck.sentences = reviewList.map(w => ({ ...w }));
  else newDeck.words = reviewList.map(w => ({ ...w }));
  decks.push(newDeck);
  saveDecks();
  alert(`"${newDeck.name}" 단어장 생성! (${reviewList.length}개)`);
}

/* ============================================
   TYPING INPUT: Enter key = submit
   ============================================ */
document.getElementById('typingInput').addEventListener('keydown', (e) => {
  if (e.key === 'Enter') {
    e.preventDefault();
    handleTypingSubmit();
  }
});

/* ── PWA Service Worker ── */
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('./sw.js').catch(() => {});
}

/* ── Init ── */
// Apply stored tab
document.querySelectorAll('.tab-btn').forEach(b => {
  b.classList.toggle('active', b.dataset.tab === currentTab);
});
checkImportFromUrl();
renderDecks();
renderStreak();
</script>
