<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#0a0a0a" id="themeColorMeta">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="VocaFlash">
<link rel="manifest" href="manifest.json">
<link rel="icon" href="icon-192.png">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="stylesheet" href="style.css">
<title>Voca Flash</title>
</head>
<body>

<!-- ═══════════ HOME ═══════════ -->
<div id="home" class="screen active">
  <div class="home-top">
    <div style="width:38px"></div>
    <div class="home-actions">
      <button class="icon-btn" id="themeToggle" onclick="toggleTheme()" title="테마 전환">🌙</button>
    </div>
  </div>
  <div class="logo">
    <h1>⚡ Voca Flash</h1>
    <p>무한 반복으로 영단어 각인</p>
  </div>
  <div class="streak-bar" id="streakBar"></div>
  <button class="upload-btn" onclick="openUploadTypeModal()">
    <svg viewBox="0 0 24 24"><path d="M12 2a1 1 0 011 1v10.586l3.293-3.293a1 1 0 111.414 1.414l-5 5a1 1 0 01-1.414 0l-5-5a1 1 0 111.414-1.414L11 13.586V3a1 1 0 011-1zM5 20a1 1 0 110 2h14a1 1 0 110-2H5z"/></svg>
    엑셀 파일 업로드 (.xlsx)
  </button>
  <input type="file" id="fileInput" accept=".xlsx,.xls" onchange="handleFile(event)">
  <div class="tab-bar" style="margin-top:14px">
    <button class="tab-btn active" data-tab="word" onclick="setTab('word')">📘 단어</button>
    <button class="tab-btn" data-tab="sentence" onclick="setTab('sentence')">📝 문장</button>
  </div>
  <div class="sort-row" id="sortRow" style="display:none;margin-top:4px">
    <span class="sort-label">정렬</span>
    <div class="sort-tabs">
      <button class="sort-tab" data-sort="recent" onclick="setSort('recent')">최근</button>
      <button class="sort-tab" data-sort="created" onclick="setSort('created')">생성순</button>
      <button class="sort-tab" data-sort="name" onclick="setSort('name')">이름순</button>
    </div>
  </div>
  <div class="deck-list" id="deckList"></div>
</div>

<!-- ═══════════ UPLOAD TYPE MODAL ═══════════ -->
<div class="modal-overlay" id="uploadTypeModal">
  <div class="modal-card">
    <div class="modal-title">어떤 종류인가요?</div>
    <div class="modal-sub">엑셀의 A열 = 문제, B열 = 뜻</div>
    <div class="mode-options">
      <button class="mode-opt" onclick="pickUploadType('word')">
        <div class="mode-icon">📘</div>
        <div class="mode-info">
          <div class="mode-name">단어장</div>
          <div class="mode-desc">단어 ↔ 뜻 암기</div>
        </div>
      </button>
      <button class="mode-opt" onclick="pickUploadType('sentence')">
        <div class="mode-icon">📝</div>
        <div class="mode-info">
          <div class="mode-name">문장 암기</div>
          <div class="mode-desc">뜻 보고 영어 문장 순서 배열</div>
        </div>
      </button>
    </div>
    <button class="modal-cancel" onclick="closeUploadTypeModal()">취소</button>
  </div>
</div>

<!-- ═══════════ MODE MODAL ═══════════ -->
<div class="modal-overlay" id="modeModal">
  <div class="modal-card">
    <div class="modal-title">학습 모드 선택</div>
    <div class="modal-sub" id="modeSub"></div>
    <div id="modeWordOptions">
      <div class="modal-section-label">방향</div>
      <div class="dir-toggle">
        <button class="dir-btn active" id="dirNormal" onclick="setDirection('normal')">단어 → 뜻</button>
        <button class="dir-btn" id="dirReverse" onclick="setDirection('reverse')">뜻 → 단어</button>
      </div>
      <div class="modal-section-label">유형</div>
      <div class="mode-options">
        <button class="mode-opt" onclick="confirmMode('choice')">
          <div class="mode-icon">🎯</div>
          <div class="mode-info">
            <div class="mode-name">4지선다</div>
            <div class="mode-desc">빠른 클릭으로 각인</div>
          </div>
        </button>
        <button class="mode-opt" onclick="confirmMode('typing')">
          <div class="mode-icon">⌨️</div>
          <div class="mode-info">
            <div class="mode-name">직접 입력</div>
            <div class="mode-desc">타이핑해서 암기 (유연한 채점)</div>
          </div>
        </button>
      </div>
    </div>
    <div id="modeSentenceOptions" style="display:none">
      <div class="mode-options">
        <button class="mode-opt" onclick="confirmMode('order')">
          <div class="mode-icon">🧩</div>
          <div class="mode-info">
            <div class="mode-name">단어 순서 배열</div>
            <div class="mode-desc">뜻을 보고 영어 문장 순서 맞추기</div>
          </div>
        </button>
      </div>
    </div>
    <button class="modal-cancel" onclick="closeModeModal()">취소</button>
  </div>
</div>

<!-- ═══════════ TEST ═══════════ -->
<div id="test" class="screen">
  <div class="combo-badge" id="comboBadge"><span class="combo-icon">🔥</span><span id="comboNum">5</span> 콤보!</div>
  <div class="test-top">
    <div class="test-top-left">
      <button class="quit-btn" onclick="quitTest()">✕</button>
      <span class="progress-txt" id="progressTxt">1 / 100</span>
    </div>
    <div style="display:flex;gap:8px;align-items:center">
      <span class="timer" id="timer" style="display:none"></span>
      <button class="icon-btn" id="ttsToggle" onclick="toggleTts()" title="발음">🔊</button>
      <button class="skip-btn" onclick="handleSkip()">넘기기</button>
    </div>
  </div>
  <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>

  <!-- Word mode -->
  <div class="word-area" id="wordArea">
    <div class="word-display" id="wordDisplay" onclick="replaySpeak()"></div>
    <div class="word-hint" id="wordHint"></div>
  </div>
  <div class="choices" id="choicesGrid"></div>
  <div class="typing-area" id="typingArea">
    <div class="typing-answer" id="typingAnswer"></div>
    <input type="text" class="typing-input" id="typingInput" placeholder="뜻을 입력하세요" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false">
    <button class="typing-submit" id="typingSubmit" onclick="handleTypingSubmit()">확인 (Enter)</button>
  </div>

  <!-- Sentence mode -->
  <div class="sentence-area" id="sentenceArea">
    <div class="sentence-meaning" id="sMeaning"></div>
    <div class="sentence-slots" id="sSlots"></div>
    <div class="sentence-answer-reveal" id="sRevealAns"></div>
    <div class="sentence-bank" id="sBank"></div>
    <button class="sentence-check" id="sCheckBtn" onclick="sCheckAnswer()" disabled>확인</button>
  </div>
</div>

<!-- ═══════════ EDIT ═══════════ -->
<div id="edit" class="screen">
  <div class="edit-header">
    <button class="back-btn" onclick="saveAndBack()">←</button>
    <div class="edit-title">
      <input type="text" id="editTitleInput" placeholder="단어장 이름">
    </div>
    <div class="edit-count" id="editCount"></div>
  </div>
  <div class="time-limit-row">
    <label>⏱️ 문항별 제한시간</label>
    <input type="number" id="editTimeLimit" min="0" max="300" placeholder="0">
    <span class="tl-hint">초 (0 = 제한 없음)</span>
  </div>
  <div class="edit-list" id="editList"></div>
  <div class="edit-bottom">
    <button class="add-word-btn" onclick="addWord()">+ 항목 추가</button>
    <button class="save-btn" onclick="saveAndBack()">저장</button>
  </div>
</div>

<!-- ═══════════ REVIEW ═══════════ -->
<div id="review" class="screen">
  <div class="review-header">
    <h2>학습 완료!</h2>
    <p id="reviewSub">오답 12개</p>
  </div>
  <div class="stats-bar" id="statsBar"></div>
  <div class="review-list" id="reviewListEl"></div>
  <div class="review-bottom">
    <div class="review-actions" id="reviewActions"></div>
    <button class="home-btn" onclick="showScreen('home')">홈으로 돌아가기</button>
  </div>
</div>

<!-- ═══════════ Scripts (load order matters) ═══════════ -->
<script src="https://cdn.sheetjs.com/xlsx-0.20.3/package/dist/xlsx.full.min.js"></script>
<script src="store.js"></script>
<script src="ui.js"></script>
<script src="app.js"></script>
</body>
</html>
